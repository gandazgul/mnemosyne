version: '3'

vars:
  BINARY_NAME: mnemosyne
  BUILD_TAGS: "sqlite_fts5"
  LDFLAGS_PKG: "github.com/gandazgul/mnemosyne/cmd"
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
  DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  HF_MODEL_EMBED: "Snowflake/snowflake-arctic-embed-m-v1.5"
  HF_MODEL_RERANK: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  MODELS_DIR: models
  LIB_DIR: lib
  # ONNX Runtime version - version 1.24.1+ will support arm64 only
  ONNXRUNTIME_VERSION: "1.23.1"
  # daulet/tokenizers release version (check go.mod)
  TOKENIZERS_VERSION: "1.26.0"

tasks:
  default:
    desc: Build the binary
    deps: [build]

  build:
    desc: Build the mnemosyne binary
    env:
      CGO_LDFLAGS: "-L{{.ROOT_DIR}}/{{.LIB_DIR}}"
    cmds:
      - >-
        go build -tags '{{.BUILD_TAGS}}'
        -ldflags "-X {{.LDFLAGS_PKG}}.Version={{.VERSION}}
        -X {{.LDFLAGS_PKG}}.Commit={{.COMMIT}}
        -X {{.LDFLAGS_PKG}}.Date={{.DATE}}"
        -o {{.BINARY_NAME}} .
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY_NAME}}"

  run:
    desc: Build and run mnemosyne
    deps: [build]
    env:
      CGO_LDFLAGS: "-L{{.ROOT_DIR}}/{{.LIB_DIR}}"
    cmds:
      - ./{{.BINARY_NAME}} {{.CLI_ARGS}}

  test:
    desc: Run all tests
    env:
      CGO_LDFLAGS: "-L{{.ROOT_DIR}}/{{.LIB_DIR}}"
    cmds:
      - go test -tags '{{.BUILD_TAGS}}' -race -v ./...

  cover:
    desc: Run tests and open HTML coverage report
    env:
      CGO_LDFLAGS: "-L{{.ROOT_DIR}}/{{.LIB_DIR}}"
    cmds:
      - go test -tags '{{.BUILD_TAGS}}' -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out
      - rm coverage.out

  lint:
    desc: Run formatters and linters
    env:
      CGO_LDFLAGS: "-L{{.ROOT_DIR}}/{{.LIB_DIR}}"
    cmds:
      - go fmt ./...
      - go vet -tags '{{.BUILD_TAGS}}' ./...
      - golangci-lint run --build-tags '{{.BUILD_TAGS}}' ./...

  install:
    desc: Install mnemosyne to $GOPATH/bin
    env:
      CGO_LDFLAGS: "-L{{.ROOT_DIR}}/{{.LIB_DIR}}"
    cmds:
      - >-
        go install -tags '{{.BUILD_TAGS}}'
        -ldflags "-X {{.LDFLAGS_PKG}}.Version={{.VERSION}}
        -X {{.LDFLAGS_PKG}}.Commit={{.COMMIT}}
        -X {{.LDFLAGS_PKG}}.Date={{.DATE}}"
        .
      - echo "Installed mnemosyne to $(go env GOPATH)/bin/mnemosyne"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}

  uninstall:
    desc: "Remove downloaded assets and the installed binary (use: task uninstall -- --db to also delete database)"
    cmds:
      - ./{{.BINARY_NAME}} cleanup {{.CLI_ARGS}} || mnemosyne cleanup {{.CLI_ARGS}}
      - rm -f $(go env GOPATH)/bin/{{.BINARY_NAME}}
      - echo "Removed $(go env GOPATH)/bin/{{.BINARY_NAME}}"

  download-all-libs:
    desc: Download all required native libraries for all target architectures (used by release)
    cmds:
      - mkdir -p {{.LIB_DIR}}/linux_amd64 {{.LIB_DIR}}/linux_arm64 {{.LIB_DIR}}/darwin_arm64 {{.LIB_DIR}}/darwin_amd64 tmp_libs
      # Linux amd64
      - curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v{{.ONNXRUNTIME_VERSION}}/onnxruntime-linux-x64-{{.ONNXRUNTIME_VERSION}}.tgz" | tar xz -C tmp_libs
      - cp -rP tmp_libs/*/lib/libonnxruntime* {{.LIB_DIR}}/linux_amd64/
      - rm -rf tmp_libs/*
      - curl -fsSL "https://github.com/daulet/tokenizers/releases/download/v{{.TOKENIZERS_VERSION}}/libtokenizers.linux-x86_64.tar.gz" | tar xz -C {{.LIB_DIR}}/linux_amd64
      # Linux arm64
      - curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v{{.ONNXRUNTIME_VERSION}}/onnxruntime-linux-aarch64-{{.ONNXRUNTIME_VERSION}}.tgz" | tar xz -C tmp_libs
      - cp -rP tmp_libs/*/lib/libonnxruntime* {{.LIB_DIR}}/linux_arm64/
      - rm -rf tmp_libs/*
      - curl -fsSL "https://github.com/daulet/tokenizers/releases/download/v{{.TOKENIZERS_VERSION}}/libtokenizers.linux-aarch64.tar.gz" | tar xz -C {{.LIB_DIR}}/linux_arm64
      # macOS arm64
      - curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v{{.ONNXRUNTIME_VERSION}}/onnxruntime-osx-arm64-{{.ONNXRUNTIME_VERSION}}.tgz" | tar xz -C tmp_libs
      - cp -rP tmp_libs/*/lib/libonnxruntime* {{.LIB_DIR}}/darwin_arm64/
      - rm -rf tmp_libs/*
      - curl -fsSL "https://github.com/daulet/tokenizers/releases/download/v{{.TOKENIZERS_VERSION}}/libtokenizers.darwin-aarch64.tar.gz" | tar xz -C {{.LIB_DIR}}/darwin_arm64
      # macOS amd64
      - curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v{{.ONNXRUNTIME_VERSION}}/onnxruntime-osx-x86_64-{{.ONNXRUNTIME_VERSION}}.tgz" | tar xz -C tmp_libs
      - cp -rP tmp_libs/*/lib/libonnxruntime* {{.LIB_DIR}}/darwin_amd64/
      - rm -rf tmp_libs/*
      - curl -fsSL "https://github.com/daulet/tokenizers/releases/download/v{{.TOKENIZERS_VERSION}}/libtokenizers.darwin-x86_64.tar.gz" | tar xz -C {{.LIB_DIR}}/darwin_amd64
      # Clean up
      - rm -rf tmp_libs

  download-models:
    desc: Download ONNX models from HuggingFace
    status:
      - test -f {{.MODELS_DIR}}/snowflake-arctic-embed-m-v1.5/onnx/model.onnx
      - test -f {{.MODELS_DIR}}/ms-marco-MiniLM-L-6-v2/onnx/model.onnx
    dotenv: ['.env']
    vars:
      HF_CMD:
        sh: command -v hf >/dev/null 2>&1 && echo "hf" || echo "huggingface-cli"
    cmds:
      - mkdir -p {{.MODELS_DIR}}/snowflake-arctic-embed-m-v1.5/onnx
      - mkdir -p {{.MODELS_DIR}}/ms-marco-MiniLM-L-6-v2
      - >-
        {{.HF_CMD}} download {{.HF_MODEL_EMBED}}
        --local-dir {{.MODELS_DIR}}/snowflake-arctic-embed-m-v1.5
        --include "onnx/model.onnx" "tokenizer*" "config.json"
      - >-
        {{.HF_CMD}} download {{.HF_MODEL_RERANK}}
        --local-dir {{.MODELS_DIR}}/ms-marco-MiniLM-L-6-v2
        --include "onnx/model.onnx" "tokenizer*" "config.json"

  download-onnxruntime:
    desc: Download ONNX Runtime shared library for the current platform
    status:
      - ls {{.LIB_DIR}}/libonnxruntime* >/dev/null 2>&1
    vars:
      # Map to ONNX Runtime naming conventions
      ORT_ARCH:
        sh: |
          arch=$(uname -m)
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          if [ "$os" = "linux" ]; then
            if [ "$arch" = "aarch64" ] || [ "$arch" = "arm64" ]; then
              echo "aarch64"
            else
              echo "x64"
            fi
          else
            if [ "$arch" = "aarch64" ] || [ "$arch" = "arm64" ]; then
              echo "arm64"
            else
              echo "x86_64"
            fi
          fi
      ORT_OS:
        sh: |
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          if [ "$os" = "darwin" ]; then
            echo "osx"
          else
            echo "$os"
          fi
      ORT_FILE: "onnxruntime-{{.ORT_OS}}-{{.ORT_ARCH}}-{{.ONNXRUNTIME_VERSION}}.tgz"
      URL: "https://github.com/microsoft/onnxruntime/releases/download/v{{.ONNXRUNTIME_VERSION}}/{{.ORT_FILE}}"
    cmds:
      - mkdir -p {{.LIB_DIR}} tmp_ort
      - echo "Downloading ONNX Runtime v{{.ONNXRUNTIME_VERSION}} from {{.URL}}"
      - curl -fsSL "{{.URL}}" | tar xz -C tmp_ort
      - cp -P tmp_ort/*/lib/libonnxruntime* {{.LIB_DIR}}/
      - rm -rf tmp_ort
      - echo "ONNX Runtime library installed to {{.LIB_DIR}}/"

  download-tokenizers:
    desc: Download pre-built libtokenizers for the current platform
    status:
      - test -f {{.LIB_DIR}}/libtokenizers.a
    vars:
      ARCH:
        sh: uname -m
      OS:
        sh: uname -s | tr '[:upper:]' '[:lower:]'
      # Build the platform suffix for the release asset
      PLATFORM:
        sh: |
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          arch=$(uname -m)
          if [ "$arch" = "arm64" ]; then
            arch="aarch64"
          fi
          echo "${os}-${arch}"
    cmds:
      - mkdir -p {{.LIB_DIR}}
      - echo "Downloading libtokenizers v{{.TOKENIZERS_VERSION}} for {{.PLATFORM}}..."
      - >-
        curl -fsSL
        "https://github.com/daulet/tokenizers/releases/download/v{{.TOKENIZERS_VERSION}}/libtokenizers.{{.PLATFORM}}.tar.gz"
        | tar xz -C {{.LIB_DIR}}
      - echo "libtokenizers installed to {{.LIB_DIR}}/"

  setup:
    desc: Install dependencies, download models and native libraries
    cmds:
      - go mod tidy
      - task: download-onnxruntime
      - task: download-tokenizers
      - task: download-models

  tag:
    desc: Create and push a git tag for the current version (must be run after setup to get the version)
    vars:
      VERSION: '{{.VERSION}}'
    cmds:
      - git tag -a "v{{.VERSION}}" -m "Release v{{.VERSION}}"
      - git push origin "v{{.VERSION}}"

  release:
    desc: 'Release using GoReleaser (default: snapshot, use CONFIRM=true for official release)'
    dotenv: ['.env']
    vars:
      CONFIRM: '{{.CONFIRM | default "false"}}'
      SDK_PATH:
        sh: xcrun --show-sdk-path 2>/dev/null || echo ""
    cmds:
      - command -v zig >/dev/null 2>&1 || { echo >&2 "zig is required but it's not installed. Aborting."; exit 1; }
      - command -v goreleaser >/dev/null 2>&1 || { echo >&2 "goreleaser is required but it's not installed. Aborting."; exit 1; }
      - |
        export SDK_PATH="{{.SDK_PATH}}"
        if [ "{{.CONFIRM}}" = "true" ]; then
          echo "Running official GoReleaser release..."
          goreleaser release --clean
        else
          echo "Running snapshot GoReleaser release... (run with CONFIRM=true for official release)"
          goreleaser release --clean --snapshot
        fi

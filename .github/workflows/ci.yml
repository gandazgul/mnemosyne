name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-latest
            target: darwin-arm64
            
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install huggingface-cli
        run: |
          pip install -U "huggingface_hub" "hf_transfer"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          
      - name: Setup Dependencies
        run: task setup

      - name: Run Linter
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --build-tags sqlite_fts5 --timeout=5m
        env:
          CGO_LDFLAGS: "-L${{ github.workspace }}/lib"

      - name: Test
        run: task test

      - name: Build Dev Binary
        run: task build

      - name: Rename Binary
        run: |
          mv mnemosyne mnemosyne-${{ matrix.target }}
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnemosyne-${{ matrix.target }}
          path: mnemosyne-${{ matrix.target }}
          retention-days: 7

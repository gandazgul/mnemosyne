version: 2

project_name: mnemosyne

before:
  hooks:
    - ./scripts/download_libs.sh

env:
  - CGO_ENABLED=1

builds:
  - id: "linux"
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target {{ if eq .Arch "arm64" }}aarch64{{ else }}x86_64{{ end }}-linux-gnu
      - CXX=zig c++ -target {{ if eq .Arch "arm64" }}aarch64{{ else }}x86_64{{ end }}-linux-gnu
      - CGO_LDFLAGS=-L{{ .Env.GITHUB_WORKSPACE }}/lib_linux_{{ .Arch }} -lrt -ldl -lm -lstdc++
      - CGO_CFLAGS=-I{{ .Env.GITHUB_WORKSPACE }}/include -D_GNU_SOURCE -Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int32_t=uint32_t -Du_int64_t=uint64_t
    flags:
      - -tags=sqlite_fts5
    ldflags:
      - -w -extldflags "-lstdc++" -X github.com/gandazgul/mnemosyne/cmd.Version={{.Version}} -X github.com/gandazgul/mnemosyne/cmd.Commit={{.Commit}} -X github.com/gandazgul/mnemosyne/cmd.Date={{.Date}}

  - id: "darwin"
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target {{ if eq .Arch "arm64" }}aarch64{{ else }}x86_64{{ end }}-macos
      - CXX=zig c++ -target {{ if eq .Arch "arm64" }}aarch64{{ else }}x86_64{{ end }}-macos
      - CGO_LDFLAGS=-L{{ .Env.GITHUB_WORKSPACE }}/lib_darwin_{{ .Arch }} -F{{ .Env.GITHUB_WORKSPACE }}/lib_darwin_{{ .Arch }} -L{{ .Env.SDKROOT }}/usr/lib -F{{ .Env.SDKROOT }}/System/Library/Frameworks
      - CGO_CFLAGS=-I{{ .Env.GITHUB_WORKSPACE }}/include
    flags:
      - -tags=sqlite_fts5
    ldflags:
      - -w -X github.com/gandazgul/mnemosyne/cmd.Version={{.Version}} -X github.com/gandazgul/mnemosyne/cmd.Commit={{.Commit}} -X github.com/gandazgul/mnemosyne/cmd.Date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999
